name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macOS-arm64
            artifact: reaper_sneakpeak-arm64.dylib
            build_file: reaper_sneakpeak.dylib
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - os: macos-14
            platform: macOS-x86_64
            artifact: reaper_sneakpeak-x86_64.dylib
            build_file: reaper_sneakpeak.dylib
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15"
          - os: windows-latest
            platform: Windows-x64
            artifact: reaper_sneakpeak-x64.dll
            build_file: Release/reaper_sneakpeak.dll
            cmake_flags: "-A x64"
          - os: ubuntu-22.04
            platform: Linux-x86_64
            artifact: reaper_sneakpeak-x86_64.so
            build_file: reaper_sneakpeak.so
            cmake_flags: ""
          - os: ubuntu-22.04-arm
            platform: Linux-aarch64
            artifact: reaper_sneakpeak-aarch64.so
            build_file: reaper_sneakpeak.so
            cmake_flags: ""

    runs-on: ${{ matrix.os }}
    continue-on-error: false
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Clone REAPER SDK
        run: git clone --depth 1 https://github.com/justinfrankel/reaper-sdk.git sdk

      - name: Clone WDL
        run: git clone --depth 1 https://github.com/justinfrankel/WDL.git WDL

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfreetype6-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev

      - name: Create build directory
        run: mkdir -p build

      - name: Configure
        working-directory: build
        run: cmake .. -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        working-directory: build
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: cmake --build . --config Release

      - name: Rename artifact
        working-directory: build
        shell: bash
        run: cp "${{ matrix.build_file }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: reaper_sneakpeak-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## SneakPeak ${{ github.ref_name }}

            Native C++ extension for REAPER - precision waveform item editor with spectral analysis, multi-item layering, and real-time metering.

            ### Downloads

            | Platform | File | Status |
            |----------|------|--------|
            | macOS arm64 (Apple Silicon) | `reaper_sneakpeak-arm64.dylib` | Stable |
            | macOS x86_64 (Intel) | `reaper_sneakpeak-x86_64.dylib` | New |
            | Windows x64 | `reaper_sneakpeak-x64.dll` | New |
            | Linux x86_64 | `reaper_sneakpeak-x86_64.so` | New |
            | Linux aarch64 | `reaper_sneakpeak-aarch64.so` | New |

            ### Installation

            Copy the binary matching your platform to your REAPER UserPlugins folder and restart REAPER:
            - **macOS**: `~/Library/Application Support/REAPER/UserPlugins/`
            - **Windows**: `%APPDATA%\REAPER\UserPlugins\`
            - **Linux**: `~/.config/REAPER/UserPlugins/`

            Open via **Actions > SneakPeak: Toggle Window**.

            See the full [CHANGELOG](https://github.com/b451c/SneakPeak/blob/main/CHANGELOG.md) for version history.

            ---
            *SneakPeak is free and open source. Support development: [Ko-fi](https://ko-fi.com/quickmd) | [Buy Me a Coffee](https://buymeacoffee.com/bsroczynskh) | [PayPal](https://paypal.me/b451c)*
